app = "fiche-db"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PRIMARY_REGION = "sin"

[mounts]
  source = "pg_data"
  destination = "/data"

[[services]]
  internal_port = 5432
  protocol = "tcp"

  [[services.ports]]
    port = 5432
    handlers = ["pg_tls"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 1000

[checks]
  [checks.pg]
    port = 5500
    type = "http"
    interval = "15s"
    timeout = "10s"
    path = "/flycheck/pg"

  [checks.role]
    port = 5500
    type = "http"
    interval = "15s"
    timeout = "10s"
    path = "/flycheck/role"

  [checks.vm]
    port = 5500
    type = "http"
    interval = "15s"
    timeout = "10s"
    path = "/flycheck/vm"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
